# Publishes the static site (index.html, assets/, works/, scripts/) to GitHub Pages.
# Excludes README.md so the homepage is index.html, not the README.
# Settings → Pages → Source: GitHub Actions.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare site for Pages
        run: |
          mkdir -p site
          cp index.html site/
          cp -r assets works scripts site/
          touch site/.nojekyll
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
